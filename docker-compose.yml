services:

  app:
    build: .
    container_name: projetphp_livrable_epsi_apache
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./logs:/var/log/apache2
    environment:
      PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-Europe/Paris}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-50M}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-50M}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_NAME: ${DATABASE_NAME:-projetphp_livrable_epsi_bdd}
      DATABASE_USER: ${DATABASE_USER:-projetphp_livrable_epsi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_MAINTENANCE: ${APP_MAINTENANCE}
      APP_URL: ${APP_URL}
      TEMP_REGISTER: ${TEMP_REGISTER}
      APP_DEMO: ${APP_DEMO}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SEND_EMAIL: ${SMTP_SEND_EMAIL}
      SMTP_SEND_NAME: ${SMTP_SEND_NAME}
      SESSION_LIFETIME: ${SESSION_LIFETIME}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:latest
    container_name: projetphp_livrable_epsi_bdd
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MARIADB_DATABASE: ${DATABASE_NAME:-projetphp_livrable_epsi_bdd}
      MARIADB_USER: ${DATABASE_USER:-projetphp_livrable_epsi}
      MARIADB_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: projetphp_livrable_epsi_adminer
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      ADMINER_DEFAULT_DB_DRIVER: mysql
      ADMINER_DEFAULT_DB_HOST: db
      ADMINER_DEFAULT_DB_NAME: ${DATABASE_NAME:-projetphp_epsi_bdd}
    ports:
      - "9999:8080"

volumes:
  db_data:
    driver: local
